name: Playwright Tests with Allure Report

on:
  schedule:
    # Daily 2:00 PM IST (8:30 AM UTC)
    - cron: '30 8 * * *'

  workflow_dispatch:

jobs:

  test:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout Code
        uses: actions/checkout@v4

      # Pull previous gh-pages history
      - name: Checkout gh-pages
        if: always()
        uses: actions/checkout@v4
        continue-on-error: true
        with:
          ref: gh-pages
          path: gh-pages

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install Dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Clean Old Results
        run: |
          rm -rf allure-results
          rm -rf test-results

      - name: Run Playwright Tests
        run: npm run test
        continue-on-error: true

      - name: Generate Allure Report with History
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          gh_pages: gh-pages
          allure_results: allure-results
          allure_history: allure-history
          keep_reports: 20

      - name: Upload Allure Report Artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: allure-report
          path: allure-history
          retention-days: 30

      - name: Deploy Allure Report to GitHub Pages
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_branch: gh-pages
          publish_dir: ./allure-history

      # 🔗 Print Report URL
      - name: Print Report URL
        if: always()
        run: |
          echo "🔗 Report URL:"
          echo "https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

      # 🔔 Slack Notification
      - name: Send Slack Notification
        if: always()
        run: |
          STATUS="SUCCESS"

          if [ "${{ job.status }}" != "success" ]; then
            STATUS="FAILED"
          fi

          REPORT_URL="https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/"

          MESSAGE="🚀 *Playwright Test Run ${STATUS}*
          🔹 Repo: ${{ github.repository }}
          🔹 Run #: ${{ github.run_number }}
          🔹 Branch: ${{ github.ref_name }}
          🔹 Triggered By: ${{ github.actor }}
          🔗 Report: ${REPORT_URL}"

          curl -X POST -H 'Content-type: application/json' \
          --data "{\"text\":\"$MESSAGE\"}" \
          ${{ secrets.SLACK_WEBHOOK }}
