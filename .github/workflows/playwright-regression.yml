name: Regression Tests

on:
  schedule:
    # Daily 11:30 PM IST
    - cron: '0 18 * * *'

  workflow_dispatch:

jobs:

  regression:

    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:

      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 18
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps

      - name: Clean Old Allure Results
        run: rm -rf allure-results allure-results-regression allure-history-regression

      - name: Run Regression Tests
        run: npm run regression
        continue-on-error: true

      - name: Prepare Regression Allure Results
        if: always()
        run: |
          mkdir -p allure-results-regression
          cp -r allure-results/* allure-results-regression/ || true

      - name: Generate Regression Allure Report
        if: always()
        uses: simple-elf/allure-report-action@master
        with:
          allure_results: allure-results-regression
          allure_history: allure-history-regression
          keep_reports: 20

      - name: Deploy Regression Report
        if: always()
        uses: peaceiris/actions-gh-pages@v3
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./allure-history-regression
          destination_dir: regression
